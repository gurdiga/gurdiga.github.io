title: Geeky stories
email: gurdiga@gmail.com
author: Vlad GURDIGA
description:
baseurl: "" # the subpath of your site, e.g. /blog
date_format: "%b %-d, %Y"
permalink: /blog/:year/:month/:day/:title/
url: "https://gurdiga.com" # the base hostname & protocol for your site, e.g. http://example.com
twitter_username:
github_username:
disqus_shortname: gurdiga-github-io # Needs url: above set for the absolute_url liquid filter to work properly

# Build settings
markdown: kramdown
remote_theme: aidewoode/jekyll-theme-mint@v1.1.0
blog_theme: auto
plugins:
  - jekyll-feed

exclude:
  - CNAME
  - Makefile
  - README.md
  - .viminfo
  - .bash_history

jekyll_compose:
  auto_open: true

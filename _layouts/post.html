---
layout: default
---

<article class="post">
  <h1>{{ page.title }}</h1>

  <time datetime="{{ page.date | date_to_xmlschema }}" style="display: block; margin-bottom: 2em">
    {% assign date_format = site.date_format | default: '%b %-d, %Y' %} {{ page.date | date: date_format }}
  </time>

  {{ content }}
</article>
